<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="#0d1117"/>

  <!-- Flame outline — dark -->
  <rect x="6" y="0" width="1" height="1" fill="#831843"/>
  <rect x="8" y="0" width="1" height="1" fill="#831843"/>
  <rect x="10" y="1" width="1" height="1" fill="#831843"/>
  <rect x="7" y="1" width="2" height="1" fill="#831843"/>
  <rect x="6" y="2" width="4" height="1" fill="#831843"/>
  <rect x="5" y="3" width="6" height="1" fill="#831843"/>
  <rect x="5" y="4" width="6" height="1" fill="#831843"/>
  <rect x="4" y="5" width="8" height="1" fill="#831843"/>
  <rect x="4" y="6" width="8" height="1" fill="#831843"/>
  <rect x="3" y="7" width="10" height="1" fill="#831843"/>
  <rect x="3" y="8" width="10" height="3" fill="#831843"/>
  <rect x="4" y="11" width="8" height="1" fill="#831843"/>
  <rect x="5" y="12" width="6" height="1" fill="#831843"/>
  <rect x="6" y="13" width="4" height="1" fill="#831843"/>
  <rect x="7" y="14" width="2" height="1" fill="#831843"/>

  <!-- Flame fill — pink -->
  <rect x="7" y="2" width="2" height="1" fill="#f472b6"/>
  <rect x="6" y="3" width="4" height="1" fill="#f472b6"/>
  <rect x="5" y="4" width="6" height="2" fill="#f472b6"/>
  <rect x="5" y="6" width="6" height="1" fill="#f472b6"/>
  <rect x="4" y="7" width="8" height="1" fill="#f472b6"/>
  <rect x="4" y="8" width="8" height="3" fill="#f472b6"/>
  <rect x="5" y="11" width="6" height="1" fill="#f472b6"/>
  <rect x="6" y="12" width="4" height="1" fill="#f472b6"/>
  <rect x="7" y="13" width="2" height="1" fill="#f472b6"/>

  <!-- Multiple flame tongues — tips -->
  <rect x="6" y="0" width="1" height="2" fill="#f9a8d4"/>
  <rect x="8" y="0" width="1" height="2" fill="#ec4899"/>
  <rect x="10" y="1" width="1" height="2" fill="#f472b6"/>

  <!-- Upper highlight — hotter top -->
  <rect x="7" y="2" width="1" height="1" fill="#f9a8d4"/>
  <rect x="6" y="3" width="2" height="1" fill="#f9a8d4"/>
  <rect x="5" y="4" width="3" height="1" fill="#f9a8d4"/>
  <rect x="5" y="5" width="2" height="1" fill="#f9a8d4"/>

  <!-- Inner hot core — glow gradient -->
  <rect x="5" y="7" width="6" height="1" fill="#f9a8d4"/>
  <rect x="5" y="8" width="6" height="2" fill="#f9a8d4"/>
  <rect x="6" y="8" width="4" height="2" fill="#fbcfe8"/>
  <rect x="7" y="8" width="2" height="2" fill="#fce7f3"/>
</svg>
