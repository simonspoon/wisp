name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  cli:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: wisp-cli-linux-amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: wisp-cli-linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: wisp-cli-darwin-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: wisp-cli-darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: wisp-cli-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }} -p wisp-cli

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: cp target/${{ matrix.target }}/release/wisp ${{ matrix.name }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: cp target/${{ matrix.target }}/release/wisp.exe ${{ matrix.name }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}

  app:
    strategy:
      matrix:
        include:
          - os: macos-latest
            args: --target universal-apple-darwin
          - os: ubuntu-latest
            args: ""
          - os: windows-latest
            args: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install
        working-directory: app

      - name: Build and upload Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ""
          releaseDraft: false
          prerelease: false

  update-tap:
    needs: cli
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew formula
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh api repos/simonspoon/homebrew-tap/dispatches \
            -f event_type=update-formula \
            -f "client_payload[tool]=wisp-cli" \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[repo]=simonspoon/wisp"
